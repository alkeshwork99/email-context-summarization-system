services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: email_context_api_app

    command: >
      bash -c "
      rm -f tmp/pids/server.pid &&
      bundle exec rails server -b 0.0.0.0
      "

    volumes:
      - .:/app

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    stdin_open: true
    tty: true

  db:
    image: postgres:17
    container_name: email_context_api_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_context_api_development

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: email_context_api_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:
