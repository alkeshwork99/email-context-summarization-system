default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  host: <%= ENV.fetch("DATABASE_HOST", "db") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "email_context_api_development") %>

test:
  <<: *default
  database: email_context_api_test

production:
  primary: &primary_production
    <<: *default
    database: email_context_api_production
    username: <%= ENV["DATABASE_USERNAME"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>

  cache:
    <<: *primary_production
    database: email_context_api_production_cache
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: email_context_api_production_queue
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: email_context_api_production_cable
    migrations_paths: db/cable_migrate
